{% extends "base.html" %}

{% block page_title %}Editor: {{ repo.name }}{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h3 class="card-title">Files in /{{ current_path }}</h3>
    <div class="card-actions">
      {% if current_path %}
      <a href="/repositories/edit/{{ repo.id }}?path={{ '/'.join(current_path.split('/')[:-1]) }}" class="btn btn-white">Up</a>
      {% endif %}
    </div>
  </div>
  <div class="list-group list-group-flush">
    {% for file in files %}
    <a href="/repositories/edit/{{ repo.id }}?path={{ file.path }}" class="list-group-item list-group-item-action">
      <div class="row align-items-center">
        <div class="col-auto">
          {% if file.is_dir %}
          <svg xmlns="http://www.w3.org/2000/svg" class="icon text-yellow" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M5 4h4l3 3h7a2 2 0 0 1 2 2v8a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-11a2 2 0 0 1 2 -2" /></svg>
          {% else %}
          <svg xmlns="http://www.w3.org/2000/svg" class="icon text-blue" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M14 3v4a1 1 0 0 0 1 1h4" /><path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2z" /></svg>
          {% endif %}
        </div>
        <div class="col text-truncate">
          {{ file.name }}
        </div>
      </div>
    </a>
    {% endfor %}
  </div>
</div>
{% endblock %}
